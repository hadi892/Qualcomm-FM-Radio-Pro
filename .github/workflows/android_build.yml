name: Qualcomm FM Radio Pro - CI Build & Test

on:
  push:
    branches: [ "main", "master" ]
  pull_request:
    branches: [ "main", "master" ]
  workflow_dispatch:

jobs:
  build:
    name: Build & Verify Qualcomm FM Pro
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle

      - name: Show Java & Gradle versions (debug)
        run: |
          java -version
          ./gradlew --version

      - name: Grant Execute Permission for Gradle Wrapper
        run: chmod +x gradlew || true

      - name: Install Android SDK command-line tools (minimal)
        run: |
          sudo apt-get update -y
          sudo apt-get install -y unzip wget
          mkdir -p $HOME/android-sdk/cmdline-tools
          cd $HOME/android-sdk/cmdline-tools
          wget -q https://dl.google.com/android/repository/commandlinetools-linux-9477386_latest.zip -O cmdline.zip
          unzip -q cmdline.zip -d latest
          mv latest $HOME/android-sdk/cmdline-tools/latest
          export ANDROID_HOME=$HOME/android-sdk
          export PATH=$ANDROID_HOME/cmdline-tools/latest/bin:$ANDROID_HOME/platform-tools:$PATH
          yes | sdkmanager --licenses || true
          sdkmanager --sdk_root=$ANDROID_HOME "platform-tools" "platforms;android-33" "build-tools;33.0.2" || true

      - name: Run JVM Unit & Robolectric Tests (with stacktrace)
        run: ./gradlew :app:testDebugUnitTest --console=plain --stacktrace --info

      - name: Assemble Debug APK
        run: ./gradlew :app:assembleDebug --console=plain --stacktrace --info

      - name: Upload Debug APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: qualcomm-fm-pro-debug-apk
          path: app/build/outputs/apk/debug/*.apk
          retention-days: 14
