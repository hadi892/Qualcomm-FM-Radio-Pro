name: Qualcomm FM Radio Pro - CI Build & Test

on:
  push:
    branches: [ "main", "master" ]
  pull_request:
    branches: [ "main", "master" ]
  workflow_dispatch:

jobs:
  build:
    name: Build & Verify Qualcomm FM Pro
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: gradle

      - name: Grant Execute Permission for Gradle Wrapper
        run: chmod +x gradlew || true

      - name: Run JVM Unit & Robolectric Tests
        run: gradle :app:testDebugUnitTest --console=plain

      - name: Assemble Debug APK
        run: gradle :app:assembleDebug --console=plain

      - name: Upload Debug APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: qualcomm-fm-pro-debug-apk
          path: app/build/outputs/apk/debug/*.apk
          retention-days: 14
