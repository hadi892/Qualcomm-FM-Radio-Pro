name: Qualcomm FM Radio Pro - CI Build & Test

on:
  push:
    branches: [ "main", "master" ]
  pull_request:
    branches: [ "main", "master" ]
  workflow_dispatch:

jobs:
  build:
    name: Build & Verify Qualcomm FM Pro
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: gradle

      - name: Grant Execute Permission for Gradle Wrapper
        run: chmod +x gradlew || true

      - name: Check for Gradle wrapper
        id: check-wrapper
        run: |
          if [ -f ./gradlew ]; then
            echo "has_wrapper=true" >> $GITHUB_OUTPUT
          else
            echo "has_wrapper=false" >> $GITHUB_OUTPUT
          fi

      - name: Setup Gradle (only if wrapper missing)
        if: steps.check-wrapper.outputs.has_wrapper == 'false'
        uses: gradle/gradle-build-action@v2
        with:
          gradle-version: '9.3.1'

      - name: Show Java & Gradle versions (debug)
        run: |
          java -version
          if [ -x ./gradlew ]; then
            ./gradlew --version
          else
            echo "No gradlew found, using system gradle"
            gradle --version
          fi

      - name: Install Android SDK command-line tools (minimal)
        run: |
          set -euo pipefail
          sudo apt-get update -y
          sudo apt-get install -y unzip wget
          export ANDROID_HOME="$HOME/android-sdk"
          mkdir -p "$ANDROID_HOME/cmdline-tools"

          TMP_ZIP="/tmp/commandlinetools.zip"
          TMP_UNPACK="/tmp/cmdline-tools-unpack"

          # Download and unpack to a temporary location to avoid moving a directory into itself
          wget -q https://dl.google.com/android/repository/commandlinetools-linux-9477386_latest.zip -O "$TMP_ZIP"
          rm -rf "$TMP_UNPACK"
          mkdir -p "$TMP_UNPACK"
          unzip -q "$TMP_ZIP" -d "$TMP_UNPACK"

          # The zip extracts a top-level 'cmdline-tools' directory. Move it into the sdk path as 'latest'.
          rm -rf "$ANDROID_HOME/cmdline-tools/latest"
          mv "$TMP_UNPACK/cmdline-tools" "$ANDROID_HOME/cmdline-tools/latest"

          export PATH="$ANDROID_HOME/cmdline-tools/latest/bin:$ANDROID_HOME/platform-tools:$PATH"

          # Use the sdkmanager from the extracted tools directly to accept licenses and install packages.
          yes | "$ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager" --licenses || true
          "$ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager" --sdk_root="$ANDROID_HOME" "platform-tools" "platforms;android-33" "build-tools;33.0.2" || true

      - name: Run JVM Unit & Robolectric Tests (with stacktrace)
        run: |
          if [ -x ./gradlew ]; then
            ./gradlew :app:testDebugUnitTest --console=plain --stacktrace --info
          else
            gradle :app:testDebugUnitTest --console=plain --stacktrace --info
          fi

      - name: Assemble Debug APK
        run: |
          if [ -x ./gradlew ]; then
            ./gradlew :app:assembleDebug --console=plain --stacktrace --info
          else
            gradle :app:assembleDebug --console=plain --stacktrace --info
          fi

      - name: Upload Debug APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: qualcomm-fm-pro-debug-apk
          path: app/build/outputs/apk/debug/*.apk
          retention-days: 14
